name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Install tools via mise
      run: mise install

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run golangci-lint
      run: mise run golangci-lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Install tools via mise
      run: mise install

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build Caddy with GoatCounter module
      run: mise run build

    - name: Verify module is loaded
      run: ./caddy list-modules | grep goatcounter

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: caddy-goatcounter
        path: ./caddy
        retention-days: 7

  test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Install tools via mise
      run: mise install

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Docker Compose
      run: docker compose version

    - name: Build Docker images
      run: mise run docker-build

    - name: Run integration tests
      run: mise run test

    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== Caddy logs ==="
        mise run logs-caddy || true
        echo "=== GoatCounter mock logs ==="
        mise run logs-goatcounter || true

    - name: Cleanup
      if: always()
      run: mise run stop || true

  build-matrix:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Install tools via mise
      run: mise install

    - name: Build module
      run: mise run build

    - name: Test binary
      run: |
        ./caddy version
        ./caddy list-modules | grep goatcounter

