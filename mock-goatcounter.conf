events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name localhost;

        location /api/v0/count {
            access_log /var/log/nginx/goatcounter.log;

            # Log the request body for debugging
            client_body_in_file_only on;
            client_body_temp_path /tmp/;

            add_header Content-Type "application/json";
            add_header Cache-Control "no-cache, no-store, must-revalidate";

            return 200 '{"status": "ok"}';
        }

        # Keep old endpoint for compatibility testing
        location /count {
            access_log /var/log/nginx/goatcounter.log;

            add_header Content-Type "image/gif";
            add_header Cache-Control "no-cache, no-store, must-revalidate";

            return 200 "GIF89a\x01\x00\x01\x00\x80\x00\x00\x00\x00\x00\x00\x00\x00!\xf9\x04\x01\x00\x00\x00\x00,\x00\x00\x00\x00\x01\x00\x01\x00\x00\x02\x02\x04\x01\x00;";
        }

        location / {
            return 404 "Not Found";
        }
    }
}